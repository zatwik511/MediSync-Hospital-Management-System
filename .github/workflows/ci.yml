name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: type-check · lint · test ───────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test

  # ── Backend: type-check · test ───────────────────────────────────────────
  # Lint is omitted until ESLint is configured for the backend package.
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        working-directory: backend
        run: npm run type-check

      - name: Test
        working-directory: backend
        run: npm test
        env:
          DATABASE_URL: postgresql://mock:mock@localhost/test
          JWT_SECRET: ci-test-secret
          PORT: 3001
          ALLOWED_ORIGINS: http://localhost:5173
